<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteadyAir | Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <style>
        .success-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .success-content h1 {
            margin-bottom: 1rem;
        }
        .success-content p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <main class="main-content success-content">
            <img src="assets/logo.png" alt="SteadyAir Logo" class="logo" style="margin-bottom: 2rem;">
            <h1>You're on the list!</h1>
            <p>Thanks for joining. We'll send you a gentle update as soon as SteadyAir is ready for takeoff.</p>
            <a href="/" class="btn btn-primary" style="text-decoration: none; padding: 12px 24px;">Return Home</a>
        </main>
    </div>
</body>
</html>
